<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIBS Babylon Consent Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #f5f5f5 100%);
    margin: 0;
    padding: 40px 20px;
    color: #1f2937;
    min-height: 100vh;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    padding: 36px;
  }
  h1 {
    margin: 0 0 6px 0;
    font-size: 26px;
    color: #0f172a;
    font-weight: 700;
  }
  .sub {
    color: #64748b;
    font-size: 15px;
    margin-bottom: 28px;
  }

  /* Dropzone */
  .dropzone {
    border: 3px dashed #cbd5e1;
    border-radius: 14px;
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }
  .dropzone:hover {
    border-color: #3b82f6;
    background: #f0f9ff;
  }
  .dropzone.active {
    border-color: #3b82f6;
    background: #eff6ff;
    transform: scale(1.01);
    border-style: solid;
  }
  .dropzone.busy {
    cursor: wait;
    border-color: #3b82f6;
    background: #eff6ff;
  }
  .drop-icon {
    font-size: 64px;
    margin-bottom: 12px;
    opacity: 0.9;
  }
  .drop-title {
    font-size: 20px;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 6px;
  }
  .drop-sub {
    font-size: 14px;
    color: #6b7280;
  }

  /* Summary card */
  .summary-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
  }
  .summary-row + .summary-row {
    border-top: 1px solid #e2e8f0;
    margin-top: 6px;
    padding-top: 12px;
  }
  .summary-label {
    color: #64748b;
    font-size: 14px;
    font-weight: 500;
  }
  .summary-value {
    color: #0f172a;
    font-size: 15px;
    font-weight: 600;
  }
  .summary-value-big {
    color: #0f172a;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  /* Buttons */
  .big-btn {
    display: block;
    width: 100%;
    padding: 22px;
    font-size: 18px;
    font-weight: 700;
    background: #10b981;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
    box-shadow: 0 2px 6px rgba(16,185,129,0.25);
  }
  .big-btn:hover:not(:disabled) {
    background: #059669;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(16,185,129,0.35);
  }
  .big-btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    box-shadow: none;
  }
  .secondary-btn {
    display: block;
    width: 100%;
    padding: 10px;
    font-size: 14px;
    background: transparent;
    color: #64748b;
    border: none;
    cursor: pointer;
    margin-top: 8px;
  }
  .secondary-btn:hover { color: #1f2937; }

  .doctor-chooser {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .doc-btn {
    flex: 1;
    padding: 16px;
    border: 2px solid #e5e7eb;
    background: #fff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    color: #374151;
  }
  .doc-btn:hover {
    border-color: #93c5fd;
  }
  .doc-btn.selected {
    border-color: #3b82f6;
    background: #eff6ff;
    color: #1d4ed8;
  }

  /* Patient preview rows */
  .patient-row {
    padding: 10px 14px;
    border-bottom: 1px solid #f3f4f6;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .patient-row:last-child { border-bottom: none; }
  .patient-name { font-weight: 600; color: #111827; }
  .patient-proc { color: #6b7280; font-size: 12px; margin-top: 3px; }

  /* Done state */
  .done-card {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
  }
  .done-check {
    font-size: 56px;
    font-weight: 700;
    color: #059669;
    line-height: 1;
    margin-bottom: 12px;
  }
  .done-title {
    font-size: 22px;
    font-weight: 700;
    color: #064e3b;
    margin-bottom: 6px;
  }
  .done-sub {
    font-size: 15px;
    color: #047857;
  }

  .error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 14px 16px;
    border-radius: 8px;
    margin-top: 16px;
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  details summary {
    cursor: pointer;
    color: #64748b;
    font-size: 14px;
    padding: 8px 0;
    user-select: none;
  }
  details summary:hover { color: #1f2937; }
  details[open] summary { margin-bottom: 6px; }
</style>
</head>

// Pluralize the procedure name when multiple levels/nerves
function pluralize(name, count) {
  if (count < 2) return name;
  // Specific plurals we know
  if (name.endsWith("Block"))    return name + "s";
  if (name.endsWith("Injection"))return name + "s";
  if (name.endsWith("Ablation")) return name + "s";
  return name;
}

// Normalize interspace like "L4-5" -> "L4-L5", "L5-S1" -> "L5-S1"
function normalizeInterspace(s) {
  s = s.toUpperCase().replace(/\s+/g,"");
  // Already has two letters like L4-L5 or L5-S1
  if (/^[CTLS]\d+-[CTLS]\d+$/.test(s)) return s;
  // Like L4-5 -> use same letter
  const m = s.match(/^([CTLS])(\d+)-(\d+)$/);
  if (m) return `${m[1]}${m[2]}-${m[1]}${m[3]}`;
  return s;
}

// Parse a single procedure fragment like "BL L3,L4,L5 RFA" or "ML C6-C7 ESI"
// Returns { lat, levels, nerves, procKey, raw }
function parseProcedureFragment(text) {
  if (!text) return null;
  const raw = text.trim();
  const upper = raw.toUpperCase().replace(/\s+/g," ").trim();

  // Extract laterality - look at tokens from the start
  const tokens = upper.split(/\s+/);
  let lat = null;
  let startIdx = 0;

  if (tokens.length && LATERALITY[tokens[0]]) {
    lat = LATERALITY[tokens[0]];
    startIdx = 1;
  }

  // Try to match a known procedure key (longest match first)
  const remaining = tokens.slice(startIdx).join(" ");
  const procKeys = Object.keys(PROC_NAMES).sort((a,b) => b.length - a.length);

  let procKey = null;
  let beforeProc = ""; // the levels/nerves string that comes BEFORE the proc key
  let afterProc  = ""; // anything after

  for (const key of procKeys) {
    // Allow proc key to appear anywhere in the remaining string
    const keyIdx = remaining.indexOf(key);
    if (keyIdx !== -1) {
      // Make sure it's a whole word match
      const before = keyIdx === 0 || /\W/.test(remaining[keyIdx - 1]);
      const after = keyIdx + key.length === remaining.length || /\W/.test(remaining[keyIdx + key.length]);
      if (before && after) {
        procKey = key;
        beforeProc = remaining.substring(0, keyIdx).trim();
        afterProc  = remaining.substring(keyIdx + key.length).trim();
        break;
      }
    }
  }

  if (!procKey) {
    return { error: "Unknown procedure", raw };
  }

  const def = PROC_NAMES[procKey];
  let nerves = [];
  let levels = [];

  // Parse tokens from "before" part (and anything after too, in case format varies)
  const allLevelText = (beforeProc + " " + afterProc).trim();
  if (allLevelText) {
    // Split by comma or whitespace
    const parts = allLevelText.split(/[\s,]+/).filter(Boolean);
    for (const p of parts) {
      const pUp = p.toUpperCase();
      // Interspace pattern (has a dash)
      if (/^[CTLS]\d+-?[CTLS]?\d+$/.test(pUp) && pUp.includes("-")) {
        levels.push(normalizeInterspace(pUp));
      }
      // Single nerve/vertebra
      else if (/^[CTLS]\d+$/.test(pUp)) {
        // Special case: for TFESI, standalone S1 is a valid transforaminal level
        // (it's the one sacral root treated like an interspace). Same for S2/S3/S4 if ever ordered.
        if (def.mode === "levels" && /^S\d+$/.test(pUp)) {
          levels.push(pUp);
        } else {
          nerves.push(pUp);
        }
      }
    }
  }

  return {
    raw,
    lat,
    procKey,
    mode: def.mode,
    nerves,
    levels,
    fullName: def.full
  };
}

// Render parsed fragment to consent-form English
function renderFragment(f) {
  if (!f || f.error) return f?.raw || "";

  const parts = [];
  if (f.lat) parts.push(f.lat);

  let siteStr = "";
  if (f.mode === "nerves" && f.nerves.length) {
    siteStr = f.nerves.join(", ");
  } else if (f.mode === "levels" && f.levels.length) {
    siteStr = f.levels.length === 1
      ? f.levels[0]
      : f.levels.slice(0,-1).join(", ") + " and " + f.levels[f.levels.length-1];
  } else if (f.mode === "level_opt") {
    if (f.levels.length) siteStr = f.levels.join(", ");
    else if (f.nerves.length) siteStr = f.nerves.join(", ");
  }

  if (siteStr) parts.push(siteStr);

  // Pluralize if needed
  const count = Math.max(f.nerves.length, f.levels.length, 1);
  parts.push(pluralize(f.fullName, count));

  return parts.join(" ");
}

// Parse a full procedure cell which may have multiple procedures
// Splits on clear boundaries: "BL ..." at start of new procedure, or explicit delimiters
// Heuristic: if text has multiple known procedure keys, split on the boundary before each one
function parseProcedureCell(text) {
  if (!text) return [];

  const upper = text.toUpperCase();
  const procKeys = Object.keys(PROC_NAMES).sort((a,b) => b.length - a.length);

  // Find all positions of procedure keys
  const positions = [];
  for (const key of procKeys) {
    let idx = 0;
    while (idx < upper.length) {
      const found = upper.indexOf(key, idx);
      if (found === -1) break;
      const before = found === 0 || /\W/.test(upper[found - 1]);
      const after = found + key.length === upper.length || /\W/.test(upper[found + key.length]);
      if (before && after) {
        positions.push({ key, start: found, end: found + key.length });
      }
      idx = found + key.length;
    }
  }

  if (positions.length === 0) {
    return [{ error: "No procedure found", raw: text }];
  }

  // Overlap filter: prefer longer matches
  positions.sort((a,b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
  let filtered = [];
  for (const p of positions) {
    if (filtered.some(f => (p.start < f.end && p.end > f.start))) continue;
    filtered.push(p);
  }

  // Absorb trailing "ESI" into preceding CAUDAL-like keys (they're the same procedure)
  // "CAUDAL" followed by "ESI" = Caudal Epidural Steroid Injection (not two procedures)
  const absorbESIInto = new Set(["CAUDAL"]);
  filtered.sort((a,b) => a.start - b.start);
  const merged = [];
  for (let i = 0; i < filtered.length; i++) {
    const curr = filtered[i];
    const next = filtered[i+1];
    if (next && next.key === "ESI" && absorbESIInto.has(curr.key)) {
      // Consume the ESI token into this procedure
      merged.push({ key: curr.key, start: curr.start, end: next.end });
      i++;
    } else {
      merged.push(curr);
    }
  }
  filtered = merged;

  if (filtered.length === 1) {
    return [parseProcedureFragment(text)];
  }

  // Multiple procedures - split the text at boundaries BEFORE each procedure key
  // Each fragment includes everything from start (or prev proc end) through current proc key,
  // PLUS any trailing levels before the NEXT proc's laterality starts
  const fragments = [];
  for (let i = 0; i < filtered.length; i++) {
    const currEnd = filtered[i].end;
    const nextStart = i + 1 < filtered.length ? filtered[i+1].start : text.length;
    // Find the start of this fragment - go back from current proc key start to after prev proc end
    const prevEnd = i === 0 ? 0 : filtered[i-1].end;
    // Trim any trailing content from prev fragment by finding laterality word boundary
    const fragText = text.substring(prevEnd, currEnd).trim();
    fragments.push(parseProcedureFragment(fragText));
  }
  // Handle trailing text after last proc (for multi-proc cells where levels trail)
  // Already included in last fragment if indexing was right.

  return fragments;
}

// Render multiple fragments to final consent text (joined with " and " or semicolons)
function renderProcedureCell(text) {
  const frags = parseProcedureCell(text);
  const rendered = frags.map(renderFragment).filter(Boolean);
  return rendered.join("; ");
}


// ============================================================
// EXCEL PARSER
// Reads the multi-line-per-patient log sheet format
// ============================================================
// Actual column structure from real .xls file:
//   [0] Time                (and "DOCTOR:"/"DATE" labels in top rows)
//   [1] Patient Name (first row of block); DOB, sex, phone (following rows)
//   [2] Procedure (shorthand like "ML L5-S1 ESI")
//   [3] Side
//   [4] Levels
//   [5] Specials / Insurance
//   [6] Allergies
//   [7] Anti-Coags / WT loss meds
//   [8] DM
//   [9] WT
//   [10] Anesthesia
//   [11] CPT Codes
//
// Header rows:
//   Row 0: [0]="DOCTOR:" [1]="Dr. Kong" (or Fanaee, etc.)
//   Row 1: [0]="DATE"    [1]=<excel serial date number>

// Convert Excel serial date to JS Date
function excelSerialToDate(serial) {
  if (typeof serial !== "number" || !isFinite(serial)) return null;
  // Excel's epoch is 1899-12-30 (accounting for 1900 leap year bug)
  const epoch = new Date(Date.UTC(1899, 11, 30));
  const d = new Date(epoch.getTime() + serial * 86400000);
  return d;
}

// Format a JS Date as MM/DD/YYYY
function fmtMDY(d) {
  if (!d) return null;
  const m = String(d.getUTCMonth() + 1).padStart(2, "0");
  const dd = String(d.getUTCDate()).padStart(2, "0");
  return `${m}/${dd}/${d.getUTCFullYear()}`;
}

function parseScheduleSheet(wb) {
  const results = { date: null, doctor: null, patients: [] };

  for (const sheetName of wb.SheetNames) {
    const sheet = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: true });

    if (rows.length === 0) continue;

    // Extract doctor and date from header rows
    for (const row of rows.slice(0, 8)) {
      const c0 = String(row[0] || "").trim().toUpperCase();
      const c1 = row[1];

      if (c0.startsWith("DOCTOR") && c1) {
        const docStr = String(c1).trim();
        if (docStr) results.doctor = docStr;
      }
      if (c0 === "DATE" && c1 !== "" && c1 !== undefined) {
        // c1 may be a number (Excel serial) or a date string
        if (typeof c1 === "number") {
          results.date = fmtMDY(excelSerialToDate(c1));
        } else {
          results.date = String(c1).trim();
        }
      }
    }

    // Walk rows looking for patient block starts:
    // A patient block starts at a row where col[0] has a time value AND col[1] has a patient name
    const timeRe = /^(\d{1,4}(AM|PM|am|pm)|\d{1,2}:\d{2}\s*(AM|PM)?)$/;

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length === 0) continue;

      const timeCell = String(row[0] || "").trim();
      const nameCell = String(row[1] || "").trim();
      const procCell = String(row[2] || "").trim();

      // Must have a time in col 0 AND a name-looking value in col 1
      const isTimeRow = timeRe.test(timeCell) || /^\d{3,4}(AM|PM|am|pm)$/i.test(timeCell);
      if (!isTimeRow) continue;

      // Skip "BREAK" rows
      if (/BREAK/i.test(nameCell) || /BREAK/i.test(procCell)) continue;

      // Must have a procedure and a patient name
      if (!nameCell || !procCell) continue;

      // Patient name pattern: LAST, FIRST (both all-caps typical but don't require)
      // Allow apostrophes, hyphens, spaces, suffixes (III, JR, etc.)
      const nameOk = /^[A-Za-z][A-Za-z\s\-'\.]*,\s*[A-Za-z][A-Za-z\s\-'\.]*$/.test(nameCell);
      if (!nameOk) continue;

      results.patients.push({
        time: timeCell,
        name: nameCell,
        procedureRaw: procCell
      });
    }

    // If we found patients, don't keep looking in other sheets
    if (results.patients.length > 0) break;
  }

  return results;
}


// ============================================================
// PDF STAMPER
// ============================================================

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Image pixel coords (150 DPI, 1275x1650) to PDF points (612x792)
// PDF origin is bottom-left
function imgToPdf(x, y) {
  return {
    x: x * (612 / 1275),
    y: 792 - y * (792 / 1650)
  };
}

// Stamp one consent page: patient name, physician name, procedure text, dates
async function stampConsent(pdfDoc, templateBytes, patientName, physicianName, procedureText, dateStr, helveticaFont) {
  // Copy the template page into the main doc
  const templateDoc = await PDFLib.PDFDocument.load(templateBytes);
  const [copiedPage] = await pdfDoc.copyPages(templateDoc, [0]);
  pdfDoc.addPage(copiedPage);

  const fontSize = 10;
  const black = PDFLib.rgb(0, 0, 0);

  // Patient name - sits on underline after "I"
  const nameCoord = imgToPdf(175, 293);
  copiedPage.drawText(patientName, {
    x: nameCoord.x, y: nameCoord.y, size: fontSize, font: helveticaFont, color: black
  });

  // Physician name
  const docCoord = imgToPdf(740, 293);
  copiedPage.drawText(physicianName, {
    x: docCoord.x, y: docCoord.y, size: fontSize, font: helveticaFont, color: black
  });

  // Procedure - left-justified, well inside the inner border, sitting up on the line
  const procFontSize = 11;
  const maxCharsLine1 = 90;
  const procLines = wrapText(procedureText, maxCharsLine1);

  const procLeftX = imgToPdf(180, 0).x;
  if (procLines[0]) {
    const proc1Y = imgToPdf(0, 420).y;
    copiedPage.drawText(procLines[0], {
      x: procLeftX,
      y: proc1Y,
      size: procFontSize,
      font: helveticaFont,
      color: black
    });
  }
  if (procLines[1]) {
    const proc2Y = imgToPdf(0, 472).y;
    copiedPage.drawText(procLines[1], {
      x: procLeftX,
      y: proc2Y,
      size: procFontSize,
      font: helveticaFont,
      color: black
    });
  }

  // Dates - Patient Signature date and Physician Signature date
  if (dateStr) {
    const patSigDate = imgToPdf(840, 1182);
    copiedPage.drawText(dateStr, {
      x: patSigDate.x, y: patSigDate.y, size: fontSize, font: helveticaFont, color: black
    });
    const physSigDate = imgToPdf(840, 1472);
    copiedPage.drawText(dateStr, {
      x: physSigDate.x, y: physSigDate.y, size: fontSize, font: helveticaFont, color: black
    });
  }
}

function wrapText(text, maxChars) {
  if (!text) return [""];
  if (text.length <= maxChars) return [text];
  const words = text.split(" ");
  let line1 = "", line2 = "";
  for (const w of words) {
    if ((line1 + " " + w).trim().length <= maxChars) {
      line1 = (line1 + " " + w).trim();
    } else {
      line2 = (line2 + " " + w).trim();
    }
  }
  return [line1, line2];
}


// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [patients, setPatients] = useState([]);
  const [parseInfo, setParseInfo] = useState(null);
  const [physician, setPhysician] = useState(null);
  const [needsPhysicianPick, setNeedsPhysicianPick] = useState(false);
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [dragActive, setDragActive] = useState(false);
  const [done, setDone] = useState(false);
  const fileInputRef = useRef(null);

  const processFile = async (file) => {
    if (!file) return;
    if (!/\.(xlsx|xls)$/i.test(file.name)) {
      setError("That doesn't look like an Excel file. Please drop a .xlsx file.");
      return;
    }
    setError(null);
    setDone(false);
    setBusy(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const parsed = parseScheduleSheet(wb);
      if (parsed.patients.length === 0) {
        setError("Couldn't find any patient entries in this file. The tool expects a schedule with a time column (like '0800AM') and patient names in LAST, FIRST format.");
        setPatients([]);
        setParseInfo(null);
        setPhysician(null);
        setNeedsPhysicianPick(false);
      } else {
        setPatients(parsed.patients);
        setParseInfo({ date: parsed.date, doctor: parsed.doctor });
        // Auto-select physician
        let detected = null;
        if (parsed.doctor) {
          if (parsed.doctor.toUpperCase().includes("FANAEE")) detected = "Dr. Eric Fanaee";
          else if (parsed.doctor.toUpperCase().includes("KONG")) detected = "Dr. Clarence Kong";
        }
        setPhysician(detected);
        setNeedsPhysicianPick(!detected);
      }
    } catch (err) {
      console.error(err);
      setError("Failed to read the Excel file: " + err.message);
    } finally {
      setBusy(false);
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragActive(false);
    const file = e.dataTransfer?.files?.[0];
    if (file) processFile(file);
  };

  const onDragOver = (e) => { e.preventDefault(); setDragActive(true); };
  const onDragLeave = (e) => { e.preventDefault(); setDragActive(false); };

  const onFileInput = (e) => {
    const file = e.target.files?.[0];
    if (file) processFile(file);
  };

  const generatePDF = async () => {
    if (!physician || patients.length === 0) return;
    setBusy(true);
    setError(null);
    try {
      const b64 = document.getElementById("consent-template-b64").textContent.trim();
      const templateBytes = base64ToBytes(b64);

      const pdfDoc = await PDFLib.PDFDocument.create();
      const helveticaFont = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

      // Prepare the date string for stamping (MM/DD/YYYY for US convention)
      const stampDate = formatDateForStamp(parseInfo?.date);

      for (const pt of patients) {
        const procText = renderProcedureCell(pt.procedureRaw);
        await stampConsent(pdfDoc, templateBytes, pt.name, physician, procText, stampDate, helveticaFont);
      }

      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      const dateStr = formatDateForFilename(parseInfo?.date);
      const physShort = physician.split(" ").pop();
      a.href = url;
      a.download = `Babylon_Consents_${physShort}_${dateStr}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      setDone(true);
    } catch (err) {
      console.error(err);
      setError("Failed to generate consents: " + err.message);
    } finally {
      setBusy(false);
    }
  };

  const reset = () => {
    setPatients([]);
    setParseInfo(null);
    setPhysician(null);
    setNeedsPhysicianPick(false);
    setError(null);
    setDone(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const previewRows = useMemo(() => {
    return patients.map(pt => ({
      ...pt,
      renderedProc: renderProcedureCell(pt.procedureRaw)
    }));
  }, [patients]);

  const hasPatients = patients.length > 0;
  const canGenerate = hasPatients && physician && !busy;

  // Format detected date nicely for display
  const displayDate = useMemo(() => {
    if (!parseInfo?.date) return null;
    try {
      const parts = parseInfo.date.split(/[\/\-]/);
      if (parts.length === 3) {
        const [m, d, y] = parts.map(Number);
        const yr = y < 100 ? 2000 + y : y;
        return new Date(yr, m-1, d).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
      }
    } catch {}
    return parseInfo.date;
  }, [parseInfo]);

  return (
    <div className="container"
         onDragOver={onDragOver}
         onDragLeave={onDragLeave}
         onDrop={onDrop}>
      <h1>Babylon Consent Generator</h1>
      <div className="sub">Drag the schedule file onto this page. Consents come out as one PDF.</div>

      {!hasPatients && (
        <div className={"dropzone " + (dragActive ? "active" : "") + (busy ? " busy" : "")}
             onClick={() => fileInputRef.current?.click()}>
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls"
            onChange={onFileInput}
            style={{display:"none"}}
          />
          {busy ? (
            <div>
              <div className="spinner"></div>
              <div style={{marginTop:16, fontWeight:600}}>Reading schedule...</div>
            </div>
          ) : (
            <div>
              <div className="drop-icon">📋</div>
              <div className="drop-title">Drop the Excel schedule here</div>
              <div className="drop-sub">or click to choose a file</div>
            </div>
          )}
        </div>
      )}

      {hasPatients && !done && (
        <>
          <div className="summary-card">
            <div className="summary-row">
              <div className="summary-label">Patients</div>
              <div className="summary-value-big">{patients.length}</div>
            </div>
            <div className="summary-row">
              <div className="summary-label">Doctor</div>
              <div className="summary-value">
                {physician || <span style={{color:"#dc2626"}}>Not detected — please select</span>}
              </div>
            </div>
            {displayDate && (
              <div className="summary-row">
                <div className="summary-label">Date</div>
                <div className="summary-value">{displayDate}</div>
              </div>
            )}
          </div>

          {needsPhysicianPick && (
            <div className="doctor-chooser">
              <button
                className={"doc-btn " + (physician === "Dr. Eric Fanaee" ? "selected" : "")}
                onClick={() => { setPhysician("Dr. Eric Fanaee"); setNeedsPhysicianPick(false); }}
              >
                Dr. Fanaee
              </button>
              <button
                className={"doc-btn " + (physician === "Dr. Clarence Kong" ? "selected" : "")}
                onClick={() => { setPhysician("Dr. Clarence Kong"); setNeedsPhysicianPick(false); }}
              >
                Dr. Kong
              </button>
            </div>
          )}

          <button
            className="big-btn success"
            onClick={generatePDF}
            disabled={!canGenerate}
          >
            {busy ? "Making consents..." : `📄  Make ${patients.length} Consents`}
          </button>

          <button className="secondary-btn" onClick={reset}>
            Use a different schedule
          </button>

          <details style={{marginTop: 20}}>
            <summary>Preview what will be on each consent</summary>
            <div style={{border:"1px solid #e5e7eb", borderRadius:6, marginTop:6, maxHeight:320, overflowY:"auto"}}>
              {previewRows.map((p, i) => (
                <div key={i} className="patient-row">
                  <div style={{flex:1}}>
                    <div className="patient-name">{p.name}</div>
                    <div className="patient-proc">{p.renderedProc || <em style={{color:"#dc2626"}}>[could not parse — consent will show raw text]</em>}</div>
                  </div>
                  <div style={{fontSize:12, color:"#9ca3af", marginLeft:12}}>{p.time}</div>
                </div>
              ))}
            </div>
          </details>
        </>
      )}

      {done && (
        <div className="done-card">
          <div className="done-check">✓</div>
          <div className="done-title">Consents downloaded</div>
          <div className="done-sub">Check your Downloads folder.</div>
          <button className="big-btn success" onClick={reset} style={{marginTop:20}}>
            Make another set
          </button>
        </div>
      )}

      {error && (
        <div className="error">
          {error}
          <button className="secondary-btn" style={{marginTop:12}} onClick={reset}>
            Start over
          </button>
        </div>
      )}

      <div style={{marginTop: 24, fontSize: 12, color: "#9ca3af", textAlign:"center"}}>
        LIBS Platform · Babylon Consent Generator
      </div>
    </div>
  );
}

function formatDateForFilename(dateStr) {
  if (!dateStr) return new Date().toISOString().split("T")[0];
  try {
    const parts = dateStr.split(/[\/\-]/);
    if (parts.length === 3) {
      let [m, d, y] = parts.map(Number);
      if (y < 100) y += 2000;
      return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    }
  } catch {}
  return dateStr.replace(/[\/\\]/g, "-");
}

// Format date for stamping on consent form (MM/DD/YYYY)
function formatDateForStamp(dateStr) {
  if (!dateStr) {
    const t = new Date();
    return `${String(t.getMonth()+1).padStart(2,"0")}/${String(t.getDate()).padStart(2,"0")}/${t.getFullYear()}`;
  }
  try {
    const parts = dateStr.split(/[\/\-]/);
    if (parts.length === 3) {
      let [m, d, y] = parts.map(Number);
      if (y < 100) y += 2000;
      return `${String(m).padStart(2,"0")}/${String(d).padStart(2,"0")}/${y}`;
    }
  } catch {}
  return dateStr;
}

window.addEventListener("drop", e => e.preventDefault());
